<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Admin - Crear Rutina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            padding: 40px 0;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .btn-add {
            background-color: #0d6efd;
            color: white;
        }

        .exercise-row {
            border-left: 4px solid #0d6efd;
            background: #f8f9fa;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 8px;
        }

        .order-badge {
            width: 30px;
            height: 30px;
            background: #0d6efd;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card p-5">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="fw-bold mb-0 text-primary">📋 Nueva Rutina</h2>
                        <a href="index.html" class="btn btn-outline-secondary btn-sm">← Volver al Panel</a>
                    </div>

                    <form id="form-rutina">
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nombre de la Rutina</label>
                                <input type="text" id="nombre" class="form-control"
                                    placeholder="Ej: Protocolo Hipertrofia A" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Tipo</label>
                                <select id="tipo_rutina_id" class="form-select" required>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Vigente</label>
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" id="vigente" checked>
                                    <label class="form-check-label">Sí</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Fecha Desde</label>
                                <input type="date" id="fecha_desde" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Fecha Hasta</label>
                                <input type="date" id="fecha_hasta" class="form-control" required>
                            </div>
                        </div>

                        <hr class="my-5">

                        <h4 class="fw-bold mb-4">💪 Armado de Entrenamiento</h4>

                        <div class="row g-2 align-items-end mb-4 bg-light p-3 rounded">
                            <div class="col-md-5">
                                <label class="form-label small fw-bold">Seleccionar Ejercicio</label>
                                <select id="select-ejercicio" class="form-select">
                                    <option value="">Elegir ejercicio...</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small fw-bold">Series</label>
                                <input type="number" id="input-series" class="form-control" placeholder="4">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small fw-bold">Reps</label>
                                <input type="number" id="input-reps" class="form-control" placeholder="12">
                            </div>
                            <div class="col-md-3">
                                <button type="button" class="btn btn-primary w-100" onclick="agregarEjercicioALista()">
                                    + Agregar a la Lista
                                </button>
                            </div>
                        </div>

                        <div id="lista-ejercicios-seleccionados" class="mb-5">
                            <p class="text-muted text-center py-3">Aún no has sumado ejercicios a esta rutina.</p>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg fw-bold">💾 Guardar Rutina
                                Completa</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        let ejerciciosDisponibles = [];
        let ejerciciosSeleccionados = []; // {ejercicio_id, nombre, series, repeticiones, orden}

        // Inicializar: Cargar tipos y ejercicios
        async function init() {
            try {
                console.log("Iniciando carga de datos...");

                // 1. Cargar Tipos de Rutina
                const resTipos = await fetch(`${API_URL}/tipo-rutina`);
                if (!resTipos.ok) throw new Error("Error cargando Tipos de Rutina");
                const tipos = await resTipos.json();

                const selectTipo = document.getElementById('tipo_rutina_id');
                selectTipo.innerHTML = '<option value="">Seleccionar Tipo...</option>'; // Limpiar
                tipos.forEach(t => {
                    selectTipo.innerHTML += `<option value="${t.id}">${t.nombre}</option>`;
                });

                // 2. Cargar Ejercicios
                const resEj = await fetch(`${API_URL}/ejercicio`);
                if (!resEj.ok) throw new Error("Error cargando Ejercicios");
                ejerciciosDisponibles = await resEj.json();

                const selectEj = document.getElementById('select-ejercicio');
                selectEj.innerHTML = '<option value="">Elegir ejercicio...</option>'; // Limpiar
                ejerciciosDisponibles.forEach(ej => {
                    selectEj.innerHTML += `<option value="${ej.id}">${ej.nombre}</option>`;
                });

                console.log("Datos cargados con éxito:", { tipos, ejerciciosDisponibles });

            } catch (e) {
                console.error("DETALLE DEL ERROR:", e);
                alert("Hubo un problema al conectar con la API. Revisa la consola (F12).");
            }
        }

        function agregarEjercicioALista() {
            const selectEj = document.getElementById('select-ejercicio');
            const inputSeries = document.getElementById('input-series');
            const inputReps = document.getElementById('input-reps');

            if (!selectEj.value || !inputSeries.value || !inputReps.value) {
                alert("Por favor, completa todos los campos del ejercicio.");
                return;
            }

            const ejId = parseInt(selectEj.value);
            const ejNombre = selectEj.options[selectEj.selectedIndex].text;

            const nuevoItem = {
                ejercicio_id: ejId,
                nombre: ejNombre,
                series: parseInt(inputSeries.value),
                repeticiones: parseInt(inputReps.value),
                orden: ejerciciosSeleccionados.length + 1
            };

            ejerciciosSeleccionados.push(nuevoItem);
            renderizarTabla();

            // Limpiar inputs
            selectEj.value = "";
            inputSeries.value = "";
            inputReps.value = "";
        }

        function renderizarTabla() {
            const container = document.getElementById('lista-ejercicios-seleccionados');
            if (ejerciciosSeleccionados.length === 0) {
                container.innerHTML = '<p class="text-muted text-center py-3">Aún no has sumado ejercicios...</p>';
                return;
            }

            container.innerHTML = ejerciciosSeleccionados.map((item, index) => `
            <div class="exercise-row d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-3">
                    <div class="order-badge">${item.orden}</div>
                    <div>
                        <h6 class="mb-0 fw-bold">${item.nombre}</h6>
                        <small class="text-primary">${item.series} Series x ${item.repeticiones} Reps</small>
                    </div>
                </div>
                <button type="button" class="btn btn-outline-danger btn-sm" onclick="eliminarEjercicio(${index})">Eliminar</button>
            </div>
        `).join('');
        }

        function eliminarEjercicio(index) {
            ejerciciosSeleccionados.splice(index, 1);
            // Recalcular órdenes
            ejerciciosSeleccionados.forEach((item, idx) => item.orden = idx + 1);
            renderizarTabla();
        }

        // ENVIAR A LA API
        document.getElementById('form-rutina').onsubmit = async (e) => {
            e.preventDefault();

            if (ejerciciosSeleccionados.length === 0) {
                alert("Debes agregar al menos un ejercicio a la rutina.");
                return;
            }

            const payload = {
                nombre: document.getElementById('nombre').value,
                tipo_rutina_id: parseInt(document.getElementById('tipo_rutina_id').value),
                fecha_desde: document.getElementById('fecha_desde').value,
                fecha_hasta: document.getElementById('fecha_hasta').value,
                vigente: document.getElementById('vigente').checked,
                ejercicios: ejerciciosSeleccionados.map(ej => ({
                    ejercicio_id: ej.ejercicio_id,
                    orden: ej.orden,
                    series: ej.series,
                    repeticiones: ej.repeticiones
                }))
            };

            try {
                const res = await fetch(`${API_URL}/rutina`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert("✅ Rutina creada exitosamente.");
                    window.location.href = "index.html"; // Volvemos al panel principal
                } else {
                    const error = await res.json();
                    alert("Error al guardar: " + JSON.stringify(error.detail));
                }
            } catch (err) {
                console.error(err);
                alert("Error de conexión con el servidor.");
            }
        };

        window.onload = init;
    </script>

</body>

</html>

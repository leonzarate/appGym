<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Del Pela Box - Alumnos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="container mx-auto p-4 max-w-4xl">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">🏋️‍♂️ Del Pela box</h1>
            <button onclick="cargarAlumnos()" class="bg-blue-600 text-white px-4 py-2 rounded-lg shadow hover:bg-blue-700 transition">
                Actualizar Lista
            </button>
        </header>

        <div id="lista-alumnos" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <p class="text-gray-500">Cargando alumnos...</p>
        </div>
    </div>

    <script>
        async function cargarAlumnos() {
            const contenedor = document.getElementById('lista-alumnos');
            
            try {
                // Hacemos el fetch a tu backend local (cambia la URL cuando hagas deploy)
                const respuesta = await fetch('http://127.0.0.1:8000/alumnos');
                const alumnos = await respuesta.json();

                contenedor.innerHTML = ''; // Limpiar mensaje de carga

                alumnos.forEach(alumno => {
                    const card = `
                        <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-blue-500">
                            <h2 class="text-xl font-bold text-gray-700">${alumno.nombre}</h2>
                            <p class="text-sm text-gray-500">${alumno.email}</p>
                            <div class="mt-4 flex justify-between items-center">
                                <span class="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded">
                                    ${alumno.objetivo}
                                </span>
                                <button class="text-blue-600 text-sm font-semibold">Ver Rutina →</button>
                            </div>
                        </div>
                    `;
                    contenedor.innerHTML += card;
                });

                if (alumnos.length === 0) {
                    contenedor.innerHTML = '<p class="text-center text-gray-500">No hay alumnos registrados todavía.</p>';
                }

            } catch (error) {
                console.error("Error:", error);
                contenedor.innerHTML = '<p class="text-red-500">Error al conectar con el servidor.</p>';
            }
        }

        // Ejecutar la carga apenas abre la página
        window.onload = cargarAlumnos;
    </script>
</body>
</html>
